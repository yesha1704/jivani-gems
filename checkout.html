<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Jivani Gems</title>
  <meta name="description" content="Securely complete your Jivani Gems order.">
  <link rel="canonical" href="https://jivani-gems.netlify.app/checkout">
  <meta name="robots" content="noindex">
  <meta property="og:title" content="Checkout — Jivani Gems">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M5 3h14l3 6-10 12L2 9z' fill='%230F1B3D'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .co-form-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px; }
    .co-voucher { display: flex; gap: 10px; margin: 8px 0 18px; }
    .co-voucher input { flex: 1; }
    @media (max-width:760px){ .co-form-2{grid-template-columns:1fr} }
  </style>
</head>
<body data-page="checkout">
  <div class="jv-container" style="padding:48px var(--pad) 100px">
    <span class="jv-eyebrow">Secure checkout</span>
    <h1 class="serif" style="font-size:clamp(36px,5vw,56px);margin:16px 0 36px">Almost yours.</h1>

    <div id="checkout-stage" class="jv-split cart">
      <!-- SHIPPING ADDRESS -->
      <div class="jv-card-panel">
        <h2 class="serif" style="font-size:24px;margin-bottom:20px">Shipping address</h2>
        <div class="jv-field"><label class="jv-label" for="co-name">Full name</label><input class="jv-input" id="co-name" type="text" autocomplete="name"></div>
        <div class="co-form-2">
          <div class="jv-field"><label class="jv-label" for="co-email">Email</label><input class="jv-input" id="co-email" type="email" autocomplete="email"></div>
          <div class="jv-field"><label class="jv-label" for="co-phone">Phone</label><input class="jv-input" id="co-phone" type="tel" autocomplete="tel"></div>
        </div>
        <div class="jv-field"><label class="jv-label" for="co-address">Address</label><input class="jv-input" id="co-address" type="text" autocomplete="street-address" placeholder="House no., street, area"></div>
        <div class="co-form-2">
          <div class="jv-field"><label class="jv-label" for="co-city">City</label><input class="jv-input" id="co-city" type="text"></div>
          <div class="jv-field"><label class="jv-label" for="co-state">State</label><input class="jv-input" id="co-state" type="text"></div>
        </div>
        <div class="jv-field"><label class="jv-label" for="co-pincode">Pincode</label><input class="jv-input" id="co-pincode" type="text" inputmode="numeric"></div>
        <p class="muted" style="font-size:12px">🔒 Payment is processed securely by Razorpay (UPI, cards, net-banking &amp; wallets). We never see your card details.</p>
      </div>

      <!-- ORDER SUMMARY + VOUCHER + PAY -->
      <aside class="jv-summary">
        <h2 class="serif" style="font-size:24px;margin-bottom:8px">Your order</h2>
        <div id="co-items"></div>

        <label class="jv-label" style="margin-top:18px;display:block">Voucher code</label>
        <div class="co-voucher">
          <input class="jv-input" id="co-voucher" type="text" placeholder="e.g. JIVANI50" autocomplete="off">
          <button class="jv-btn jv-btn-sm" id="co-apply" type="button">Apply</button>
        </div>

        <div id="co-totals"></div>
        <button class="jv-btn jv-btn-block" id="co-pay" style="margin-top:18px">Pay securely</button>
        <p class="muted center" style="font-size:12px;margin-top:12px">By paying you agree to our Terms. A confirmation email follows instantly.</p>
      </aside>
    </div>
  </div>

  <!-- Razorpay Checkout widget (opens the secure payment popup) -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script><script src="js/supabaseClient.js"></script>
  <script src="js/data.js"></script><script src="js/ui.js"></script><script src="js/auth.js"></script>
  <script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/checkout.js"></script>
</body>
</html>
