<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Arrivals — Jivani Gems</title>
  <meta name="description" content="The latest lab-grown diamond pieces to join the Jivani Gems atelier — freshly added, sorted newest first.">
  <link rel="canonical" href="https://jivanigems.netlify.app/new-arrivals">
  <meta property="og:type" content="website">
  <meta property="og:title" content="New Arrivals — Jivani Gems">
  <meta property="og:description" content="The latest certified lab-grown diamond pieces.">
  <meta property="og:image" content="https://jivanigems.netlify.app/assets/og-image.jpg">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M5 3h14l3 6-10 12L2 9z' fill='%230F1B3D'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="new">
  <div class="jv-page-hero">
    <span class="jv-eyebrow center">Just In · MMXXVI</span>
    <h1>New <em>arrivals</em>.</h1>
    <p>The newest additions to the atelier, sorted by the date they were created. Be the first.</p>
  </div>

  <div class="jv-container" style="padding-bottom:100px">
    <div class="jv-toolbar"><span class="count" id="na-count">Loading…</span></div>
    <div id="na-grid" class="jv-grid cols-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script><script src="js/supabaseClient.js"></script>
  <script src="js/data.js"></script><script src="js/ui.js"></script><script src="js/auth.js"></script>
  <script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/products.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('na-grid');
      JVProducts.skeleton(grid, 8, 4);
      const all = await JVProducts.fetchAll();
      // Show pieces flagged is_new_arrival; if none, fall back to the 8 most recent.
      let list = all.filter(p => p.is_new_arrival);
      if (!list.length) list = all;
      list = [...list].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      document.getElementById('na-count').textContent = `${list.length} new piece${list.length === 1 ? '' : 's'}`;
      JVProducts.renderGrid(grid, list, 4);
    });
  </script>
</body>
</html>
